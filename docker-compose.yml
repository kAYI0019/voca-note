services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: voca
      POSTGRES_USER: voca
      POSTGRES_PASSWORD: voca
    ports:
      - "5432:5432"

volumes:
  redis-data:
